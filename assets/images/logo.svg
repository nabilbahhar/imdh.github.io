<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="240" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @keyframes flicker {
                0%, 100% {
                    transform: scaleY(1);
                    opacity: 0.9;
                }
                50% {
                    transform: scaleY(0.95);
                    opacity: 1;
                }
            }

            .flame {
                animation: flicker 3s ease-in-out infinite;
                transform-origin: center bottom;
            }

            .flame-inner {
                animation: flicker 2.5s ease-in-out infinite;
                transform-origin: center bottom;
            }

            .text-label {
                font-family: 'Playfair Display', serif;
                font-size: 12px;
                font-weight: 700;
                fill: #c62828;
                letter-spacing: 2px;
            }
        </style>
    </defs>

    <!-- Flame (Main outer shape) -->
    <path class="flame" d="M50 15 Q35 35 35 50 Q35 65 50 75 Q65 65 65 50 Q65 35 50 15 Z" fill="#c62828"/>

    <!-- Flame inner (Glow effect) -->
    <path class="flame-inner" d="M50 25 Q42 35 42 48 Q42 58 50 65 Q58 58 58 48 Q58 35 50 25 Z" fill="#ff5252" opacity="0.8"/>

    <!-- Highlight on flame -->
    <ellipse cx="48" cy="35" rx="4" ry="8" fill="#ff8a80" opacity="0.6"/>

    <!-- Candle body (Wax) -->
    <rect x="40" y="72" width="20" height="25" fill="#f5deb3" stroke="#d4af37" stroke-width="0.5"/>

    <!-- Candle top ring -->
    <ellipse cx="50" cy="72" rx="10" ry="3" fill="#e8d4a8" stroke="#d4af37" stroke-width="0.5"/>

    <!-- Candle drip (Melted wax) -->
    <ellipse cx="50" cy="97" rx="12" ry="8" fill="#f5deb3" opacity="0.6"/>

    <!-- Additional small drips -->
    <ellipse cx="40" cy="95" rx="3" ry="5" fill="#f5deb3" opacity="0.4"/>
    <ellipse cx="60" cy="96" rx="3" ry="5" fill="#f5deb3" opacity="0.4"/>

    <!-- IMDH Text Label -->
    <text x="50" y="115" text-anchor="middle" class="text-label">IMDH</text>
</svg>
